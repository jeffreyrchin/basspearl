<!DOCTYPE html>
<html lang="en" class="dark h-full">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Analytics GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        // Initialize with measurement ID if provided by Vite
        const gaId = "%VITE_GA_MEASUREMENT_ID%";
        if (gaId && !gaId.startsWith('%')) {
            gtag('config', gaId);
        }
    </script>
    <title>GlitchBrain.io | Glitch Art Editor</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#fb00ff">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-title" content="GlitchBrain.io">
    <meta name="application-name" content="GlitchBrain.io">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Genos:ital,wght@0,100..900;1,100..900&family=Jockey+One&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
    <link
        href="https://fonts.googleapis.com/css2?family=Genos:ital,wght@0,100..900;1,100..900&family=Jockey+One&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#fb00ff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0a0a1a",
                        "accent-blue": "#00f2ff",
                    },
                    fontFamily: {
                        "display": ["Genos", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(16, 25, 34, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cyber-glow {
            box-shadow: 0 0 15px rgba(251, 0, 255, 0.3);
        }

        .active-glow {
            text-shadow: 0 0 8px rgba(251, 0, 255, 0.8);
        }

        .grid-bg {
            background-image: radial-gradient(circle, #3d1a3d 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #fb00ff;
            border-radius: 10px;
        }

        @keyframes scanline {
            0% {
                top: -10%;
            }

            100% {
                top: 110%;
            }
        }

        .scanline-anim {
            animation: scanline 4s linear infinite;
        }

        .glitch-text-shadow {
            text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff;
        }

        /* Custom Slider Styling */
        .custom-slider {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }

        /* Track Styles */
        .custom-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .custom-slider::-moz-range-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        /* Handle (Thumb) Styles */
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #fb00ff;
            cursor: pointer;
            margin-top: -8px;
            /* Centers 20px thumb on 4px track */
            box-shadow: 0 0 10px rgba(251, 0, 255, 0.5);
            border: 2px solid #ffffff;
            transition: transform 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }

        .custom-slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(251, 0, 255, 0.8);
        }

        .custom-slider::-moz-range-thumb {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #fb00ff;
            cursor: pointer;
            margin-top: -8px;
            /* Centers 20px thumb on 4px track */
            box-shadow: 0 0 10px rgba(251, 0, 255, 0.5);
            border: 2px solid #ffffff;
            transition: transform 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }

        .custom-slider::-moz-range-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(251, 0, 255, 0.8);
        }
    </style>
    <script type="importmap">
{
  "imports": {

    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>

</head>

</body>

</html>
